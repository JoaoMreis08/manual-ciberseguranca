
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Cibersegurança - Estágio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Ciber<span>Security</span> Hub</h1>
        <p>Plano de Formação e Infraestrutura</p>
    </header>

    <nav class="tabs-nav">
        <button class="tab-btn active" onclick="openTab(event, 'formacao')">Formação & Jogo</button>
        <button class="tab-btn" onclick="openTab(event, 'infra')">Infraestrutura</button>
        <button class="tab-btn" onclick="openTab(event, 'conduta')">Manual de Conduta</button>
    </nav>

    <main class="container">
        <section id="formacao" class="tab-content active">
            <div class="game-header">
                <h2>Desafio: Detetive de Phishing</h2>
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <p id="question-number">Pergunta 1 de 5</p>
            </div>
            
            <div class="game-container">
                <div class="email-zoom-container">
                    <img id="email-image" src="" alt="Exame de e-mail">
                </div>
                
                <div class="game-controls">
                    <button class="btn-real" onclick="checkAnswer(true)">Parece Seguro</button>
                    <button class="btn-phishing" onclick="checkAnswer(false)">É Phishing!</button>
                </div>
                <div id="feedback" class="feedback"></div>
            </div>
        </section>

        <section id="infra" class="tab-content">
            <h2>Levantamento de Infraestrutura</h2>
            <p>Conteúdo a ser desenvolvido pelo Colega A.</p>
            </section>

        <section id="conduta" class="tab-content">
            <h2>Manual de Conduta</h2>
            <p>Conteúdo a ser desenvolvido pelo Colega B.</p>
            </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
